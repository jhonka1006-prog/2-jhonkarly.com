<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ícono de marca — Jhonkarly Alvarez: hacha nórdica -->
  <rect width="64" height="64" fill="#0a0a0a"/>
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Mango diagonal -->
  <line x1="18" y1="57" x2="41" y2="15" stroke="#fafafa" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Amarre del mango -->
  <line x1="34" y1="27" x2="40" y2="30" stroke="#0a0a0a" stroke-width="1.4"/>
  <line x1="35.5" y1="24.5" x2="41.5" y2="27.5" stroke="#0a0a0a" stroke-width="1.4"/>

  <!-- Cabeza del hacha: hoja barbada vikinga -->
  <path
    d="M35 9
       C 42 12.5, 49 12.5, 56 8
       C 59.5 19, 56 31, 45.5 39
       C 44 30.5, 40.5 23.5, 33.5 18.5
       Z"
    fill="#fafafa"
  />
  <!-- Filo: brillo sutil siguiendo el borde de corte -->
  <path
    d="M56 8 C 59.5 19, 56 31, 45.5 39"
    fill="none"
    stroke="#9a9a9a"
    stroke-width="1.2"
    opacity="0.9"
  />
</svg>
